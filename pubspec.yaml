name: recipiezz
description: Recipezz — Your cozy digital recipe book powered by AI.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔐 Backend & Auth
  supabase_flutter: ^2.5.6

  # 🤖 AI
  google_generative_ai: ^0.4.6

  # 🌐 Networking
  http: ^1.2.1
  url_launcher: ^6.3.0

  # 🖼️ Images
  cached_network_image: ^3.3.1

  # 🗺️ Navigation
  go_router: ^14.2.7

  # 🔄 State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 🎨 Fonts & Visuals
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1

  # 🌍 Internationalisation
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/animations/
  #   - assets/icons/
